<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Crack Tester - Password Strategy Vulnerability Analysis</title>
    <link rel="stylesheet" href="design.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="crack-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            
            <ul class="nav-menu">
                <li><a href="Home.html" class="nav-link">Home</a></li>
                <li><a href="crack-tester.html" class="nav-link">Tester</a></li>
            </ul>
        </div>
    </nav>

    <!-- Password Tester Section -->
    <section class="password-tester" id="tester">
        <div class="tester-card">
            <header class="hero-header">
                <h1 class="hero-title">Password Strategy Vulnerability</h1>
                <p class="hero-subtitle">Interactive Password Strength Tester</p>
            </header>

            <div class="tester-layout">
                <div class="tester-main">
                    <div class="tester-container">
                        <input
                            type="password"
                            id="passwordInput"
                            class="password-input"
                            placeholder="Enter a password to test..."
                            onkeyup="checkPassword()"
                        >

                        <button
                            id="toggleBtn"
                            class="toggle-btn"
                            onclick="togglePassword()"
                        >
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>

                    <div class="tester-action-row">
                        <button
                            type="button"
                            id="enterBtn"
                            class="enter-btn"
                            onclick="goToResults()"
                        >
                            ENTER
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>



    <script>
        // Security Gate: Kicks them back to consent page if they haven't agreed
        if (sessionStorage.getItem("privacyConsentGranted") !== "true") {
            window.location.href = './index.html';
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
