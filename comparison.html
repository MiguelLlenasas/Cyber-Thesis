<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Vulnerability Classification System</title>
    <style>
        /* ===== Global Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ffffff;
            --secondary-color: #f7f7f9;
            --accent-color: #e6e6ea;
            --highlight-color: #e94560;
            /* keep accent */
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --text-light: #111111;
            --text-dark: #111111;
            --border-color: #e6e6e6;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Century Gothic', 'Inter', sans-serif;
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== Intro Animations (NEW) ===== */
        @keyframes introFadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes introFadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-nav {
            animation: introFadeDown 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .intro-card {
            opacity: 0;
            animation: introFadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: 0.1s;
        }

        .intro-stagger {
            opacity: 0;
            animation: introFadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Stagger delays for internal elements */
        .delay-1 {
            animation-delay: 0.3s;
        }

        .delay-2 {
            animation-delay: 0.45s;
        }

        .delay-3 {
            animation-delay: 0.6s;
        }

        /* ===== Hero Section ===== */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 90vh;
            padding: 80px 20px;
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: none;
            pointer-events: none;
        }

        .hero-content {
            flex: 1;
            z-index: 1;
            max-width: 600px;
            animation: slideInLeft 0.8s ease;
        }

        .title-main {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: #111111;
        }

        .title-sub {
            font-size: 1.3rem;
            color: #222222;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .hero-description {
            font-size: 1.1rem;
            color: rgba(0, 0, 0, 0.8);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .cta-button {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: #111111;
            color: #ffffff;
            font-family: 'Century Gothic', 'Inter', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        }

        .hero-animation {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: slideInRight 0.8s ease;
        }

        .animated-lock {
            width: 200px;
            height: 200px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect rx='12' width='64' height='64' fill='%23111111'/><path d='M20 28v-6a12 12 0 0 1 24 0v6' stroke='%23ffffff' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='16' y='28' width='32' height='22' rx='3' fill='%23ffffff'/><circle cx='32' cy='39' r='3' fill='%23111111'/></svg>");
            background-repeat: no-repeat;
            background-position: center;
            background-size: 72%;
            border-radius: 20px;
            position: relative;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
        }

        .animated-lock::before {
            content: '';
            display: none;
        }

        /* ===== Password Tester Section ===== */
        .password-tester {
            padding: 100px 20px;
            border-top: 4px solid rgba(46, 204, 113, 0.12);
        }

        .tester-container {
            position: relative;
            max-width: 500px;
            margin: 2rem auto;
        }

        /* Two-column layout for tester */
        .tester-layout {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tester-main {
            flex: 1 1 60%;
        }

        .tester-sidebar {
            width: 360px;
            flex: 0 0 360px;
        }

        .sidebar-top-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .sidebar-top-row>div {
            flex: 1;
            min-width: 250px;
        }

        @media (max-width: 900px) {
            .tester-layout {
                flex-direction: column;
                padding: 0 10px;
            }

            .tester-sidebar {
                width: 100%;
                flex: none;
            }

            .sidebar-top-row {
                flex-direction: column;
            }
        }

        .password-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            font-size: 1rem;
            border: 2px solid var(--success-color);
            border-radius: 10px;
            background: rgba(10, 30, 10, 0.6);
            color: #eefaf0;
            outline: none;
            transition: var(--transition);
        }

        .password-input:focus {
            border-color: var(--success-color);
            box-shadow: 0 0 18px rgba(46, 204, 113, 0.25);
        }

        .password-input::placeholder {
            color: rgba(236, 240, 241, 0.5);
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .toggle-btn:hover {
            color: var(--success-color);
        }

        .enter-btn {
            margin-top: 1rem;
            padding: 0.8rem 1.4rem;
            background: rgba(233, 69, 96, 0.95);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            background: #ff6b98;
        }

        .tester-action-row {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
        }

        /* ===== Animations ===== */
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        /* =========================================
   NEW BACKGROUND STYLING (ANIMATED WAVES) 
   ========================================= */
        body.crack-page {
            color: #1a1a1a;
            background: linear-gradient(315deg,
                    rgba(0, 0, 0, 1) 5%,
                    /* Black */
                    rgba(10, 25, 60, 1) 38%,
                    /* Deep Blue */
                    rgba(80, 80, 80, 1) 68%,
                    /* Gray */
                    rgba(0, 10, 30, 1) 98%
                    /* Deep Blue / Black */
                );
            background-size: 400% 400%;
            background-attachment: fixed;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        .wave {
            background: rgba(255, 255, 255, 0.15);
            /* Slightly lower opacity for dark bg */
            border-radius: 1000% 1000% 0 0;
            position: fixed;
            width: 200%;
            height: 12em;
            bottom: 0;
            left: 0;
            transform: translate3d(0, 0, 0);
            animation: wave 10s -3s linear infinite;
            opacity: 0.8;
            z-index: -1;
        }

        .wave:nth-of-type(2) {
            bottom: -1.25em;
            animation: wave 18s linear reverse infinite;
            opacity: 0.8;
        }

        .wave:nth-of-type(3) {
            bottom: -2.5em;
            animation: wave 20s -1s reverse infinite;
            opacity: 0.9;
        }

        @keyframes wave {
            2% {
                transform: translateX(1px);
            }

            25% {
                transform: translateX(-25%);
            }

            50% {
                transform: translateX(-50%);
            }

            75% {
                transform: translateX(-25%);
            }

            100% {
                transform: translateX(1px);
            }
        }

        /* ========================================= */

        body.crack-page .logo {
            color: #1d1d1d;
        }

        body.crack-page .nav-link {
            color: #222;
        }

        body.crack-page .nav-link:hover {
            color: #e94560;
        }

        body.crack-page .password-tester {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: transparent;
            min-height: 100vh;
        }

        body.crack-page .tester-card {
            width: 100%;
            max-width: 840px;
            margin: 0 auto;
            padding: 60px 55px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        body.crack-page .hero-header {
            margin-bottom: 40px;
            text-align: center;
        }

        body.crack-page .hero-title {
            font-size: clamp(2.8rem, 4vw, 4rem);
            line-height: 1.05;
            margin-bottom: 15px;
            letter-spacing: -0.05em;
            color: #111;
        }

        body.crack-page .hero-subtitle {
            font-size: 1.15rem;
            color: #514f4c;
            margin: 0;
            font-weight: 500;
        }

        body.crack-page .tester-layout {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.crack-page .tester-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }

        body.crack-page .password-input {
            width: 100%;
            padding: 18px 52px 18px 22px;
            font-size: 1rem;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 14px;
            background: #f2f2ee;
            color: #161616;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        body.crack-page .password-input:focus {
            border-color: rgba(233, 69, 96, 0.8);
            box-shadow: 0 0 0 5px rgba(233, 69, 96, 0.08);
        }

        body.crack-page .toggle-btn {
            color: #111;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        body.crack-page .toggle-btn:hover {
            color: #e94560;
        }

        body.crack-page .enter-btn {
            margin-top: 30px;
            padding: 16px 48px;
            font-size: 1rem;
            background: #8d8680;
            color: #fff;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            letter-spacing: 0.05em;
            min-width: 220px;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.12);
        }

        body.crack-page .enter-btn:hover {
            background: #7a726d;
            transform: translateY(-1px);
        }

        @media (max-width: 760px) {
            body.crack-page .tester-card {
                padding: 40px 24px;
            }

            body.crack-page .hero-title {
                font-size: 2.4rem;
            }

            body.crack-page .enter-btn {
                width: 100%;
                min-width: 0;
            }
        }

        @media (max-width: 520px) {
            body.crack-page .hero-title {
                font-size: 2rem;
            }

            body.crack-page .hero-subtitle {
                font-size: 1rem;
            }
        }

        /* ===== Enter Click Animation Background ===== */
        #enterBtn,
        #enterBtn:active,
        #enterBtn:focus {
            outline: none;
        }

        body.enter-animate::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.30), rgba(0, 0, 0, 0.18), rgba(160, 160, 160, 0.25));
            background-size: 220% 220%;
            mix-blend-mode: multiply;
            animation: contrastShiftEnter 1.4s ease-in-out both;
        }

        @keyframes contrastShiftEnter {
            0% {
                filter: contrast(1) brightness(1);
                background-position: 0% 50%;
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            50% {
                filter: contrast(1.25) brightness(0.98);
                background-position: 100% 0%;
            }

            100% {
                filter: contrast(1) brightness(1);
                background-position: 0% 50%;
                opacity: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body.enter-animate::after {
                animation: none;
            }
        }

        /* ===== NEW Custom Toast Notification & Input Error State ===== */
        .toast-notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background-color: #e74c3c;
            /* Red Danger Color */
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.35);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-notification i {
            margin-right: 10px;
        }

        /* Shake Animation for Empty Field Error */
        @keyframes shakeError {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-8px);
            }

            40%,
            80% {
                transform: translateX(8px);
            }
        }

        .input-error {
            animation: shakeError 0.4s ease-in-out;
            border-color: #e74c3c !important;
            background-color: #fdf2f2 !important;
        }

        /* ===== Compare Badge Placement ===== */
        .compare-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #1e40af;
            /* Deep Blue text and icon */
            background: rgba(30, 64, 175, 0.1);
            /* Light Deep Blue background */
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            width: fit-content;
            margin: 0 auto 20px auto;
        }

        /* ======================================================= */
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="crack-page">

    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>

    <section class="password-tester" id="tester">
        <div class="tester-card intro-card">

            <header class="hero-header intro-stagger delay-1">
                <h1 class="hero-title">Password Vulnerability Classification System</h1>
                <p class="hero-subtitle">For Password Analysis Overview</p>
                <!-- Removed the redundant subtitle text from here -->
            </header>

            <div class="tester-layout">
                <div class="tester-main">

                    <div class="tester-container intro-stagger delay-2">
                        <!-- Added as a highlighted UI badge prompting the user directly above the input -->
                        <div class="compare-badge">
                            <i class="fa-solid fa-code-compare"></i> Try to input another password to compare
                        </div>

                        <div style="position: relative;">
                            <input type="password" id="passwordInput" class="password-input"
                                placeholder="Enter a password to test..." onkeyup="checkPassword()">
                            <button id="toggleBtn" class="toggle-btn" onclick="togglePassword()">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="tester-action-row intro-stagger delay-3" style="gap: 15px;">
                        <button type="button" id="enterBtn" class="enter-btn" onclick="animateEnterAndGoToResults()">
                            ENTER
                        </button>
                        <button type="button" id="resetTesterBtn" class="enter-btn" style="background: #e74c3c;"
                            onclick="resetPasswordTest()">
                            RESET TEST
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <script>
        // Security Gate: Kicks them back to consent page if they haven't agreed
        if (sessionStorage.getItem("privacyConsentGranted") !== "true") {
            window.location.href = './index.html';
        }
    </script>

    <script>
        // Custom Toast Notification Function
        function showCustomToast(message) {
            let toast = document.getElementById('customToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'customToast';
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }

            // Adding an icon to the message for a cleaner design
            toast.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${message}`;
            toast.classList.add('show');

            // Remove toast after 3 seconds
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Trigger short contrast animation when user clicks ENTER, then navigate
        function animateEnterAndGoToResults() {
            // Check for empty input before proceeding
            const pwInput = document.getElementById('passwordInput');
            if (pwInput && pwInput.value.trim() === '') {
                // Show Custom Toast
                showCustomToast('Please enter a password to compare.');

                // Add error shake animation to input field
                pwInput.classList.remove('input-error');
                void pwInput.offsetWidth; // Trigger reflow so animation can restart if clicked consecutively
                pwInput.classList.add('input-error');

                // Clean up error state automatically after animation
                setTimeout(() => {
                    pwInput.classList.remove('input-error');
                }, 500);

                return; // Stop execution if empty
            }

            try {
                document.body.classList.remove('enter-animate');
                void document.body.offsetWidth;
                document.body.classList.add('enter-animate');
            } catch (e) { }

            setTimeout(() => {
                if (typeof goToResults === 'function') {
                    goToResults();
                } else {
                    window.location.href = 'results.html';
                }
            }, 120);
        }

        // Function to completely reset the password test
        function resetPasswordTest() {
            // Clear any stored analysis data
            sessionStorage.removeItem('lastAnalysis');
            sessionStorage.removeItem('analysisHistory');

            // Clear the password input field if it exists on this page
            const pwInput = document.getElementById('passwordInput');
            if (pwInput) {
                pwInput.value = '';
            }

            // Redirect to the entry page
            window.location.replace('crack-tester.html');
        }

        // NAVIGATION GUARD: If the user somehow navigates back to this page 
        // after a reset (when history is empty), immediately force them to the start page.
        if (!sessionStorage.getItem("analysisHistory") && !sessionStorage.getItem("lastAnalysis")) {
            window.location.replace('crack-tester.html');
        }

        // Security Gate: Kicks them back to consent page if they haven't agreed
        if (sessionStorage.getItem("privacyConsentGranted") !== "true") {
            window.location.href = './index.html';
        }

        // --- ADDED: Aggressive Enter key listener ---
        document.addEventListener('DOMContentLoaded', () => {
            const pwInput = document.getElementById('passwordInput');
            if (pwInput) {
                // 1. Intercept 'keydown' in the capture phase to trigger the custom toast
                pwInput.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        event.stopPropagation();
                        event.stopImmediatePropagation(); // Blocks script.js from seeing the event
                        animateEnterAndGoToResults();
                    }
                }, true);

                // 2. Silence 'keyup' and 'keypress' so script.js doesn't trigger the default alert
                ['keyup', 'keypress'].forEach(eventType => {
                    pwInput.addEventListener(eventType, function (event) {
                        if (event.key === 'Enter') {
                            event.preventDefault();
                            event.stopPropagation();
                            event.stopImmediatePropagation();
                        }
                    }, true);
                });
            }
        });
    </script>

    <script src="script.js"></script>
</body>

</html>
